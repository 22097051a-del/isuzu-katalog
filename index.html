<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Avrupa Cıvata | Isuzu Stratejik Katalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { background-color: #0a0c10; color: #cbd5e1; font-family: sans-serif; }</style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto bg-white/5 p-12 rounded-3xl border border-white/10 shadow-2xl text-center">
        <i data-lucide="factory" class="mx-auto w-16 h-16 text-blue-500 mb-6"></i>
        <h1 class="text-5xl font-black text-white italic mb-4 uppercase tracking-tighter">AVRUPA CİVATA</h1>

        <div class="grid grid-cols-3 gap-4 mb-12">
            <div class="bg-slate-900 p-6 rounded-xl border border-white/5">
                <div class="text-blue-500 text-[10px] font-bold uppercase mb-1">TR Sıralama</div>
                <div class="text-3xl font-black text-white italic">79.</div>
            </div>
            <div class="bg-slate-900 p-6 rounded-xl border border-white/5">
                <div class="text-green-500 text-[10px] font-bold uppercase mb-1">Büyüme</div>
                <div class="text-3xl font-black text-white italic">%44</div>
            </div>
            <div class="bg-slate-900 p-6 rounded-xl border border-white/5">
                <div class="text-amber-500 text-[10px] font-bold uppercase mb-1">Tahsilat</div>
                <div class="text-3xl font-black text-white italic">40G</div>
            </div>
        </div>
        <p class="text-slate-500 text-[10px] font-mono uppercase tracking-widest italic">Sistem Yayında - OEM Onaylı Altyapı</p>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
